name: Prediction-App CI/CD

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/prediction-backend:latest
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/prediction-frontend:latest

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
      PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
    steps:
      - uses: actions/checkout@v3

      # Backend
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - run: |
          cd backend
          pytest --maxfail=1 --disable-warnings -q

      # Frontend
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: |
          cd frontend
          npm ci
      - run: |
          cd frontend
          npm run build

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

  deploy-to-codespace:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy backend container
        run: |
          docker rm -f prediction_backend || true
          docker run -d \
            --name prediction_backend \
            -p 8000:8000 \
            -e PINATA_API_KEY=${{ secrets.PINATA_API_KEY }} \
            -e PINATA_SECRET_API_KEY=${{ secrets.PINATA_SECRET_API_KEY }} \
            ${{ env.BACKEND_IMAGE }}

      - name: Deploy frontend container
        run: |
          docker rm -f prediction_frontend || true
          docker run -d \
            --name prediction_frontend \
            -p 3000:80 \
            ${{ env.FRONTEND_IMAGE }}
